# ══════════════════════════════════════════════════════════════════════════════
# pytest.ini — pytest Configuration File
# ══════════════════════════════════════════════════════════════════════════════
#
# This file configures pytest's default behaviour for this project.
# pytest reads it automatically when you run 'pytest' in this folder.
#
# WHY USE THIS FILE?
#   Without it, you'd have to pass all these options on the command line every time:
#     pytest tests/ -v --tb=short
#   With it, just running 'pytest' applies all the settings below automatically.
#
# OTHER CONFIGURATION FILE OPTIONS (for reference):
#   setup.cfg   → a general Python project config file (pytest section works too)
#   pyproject.toml → modern Python project config (has [tool.pytest.ini_options])
#   conftest.py → for fixtures and hooks, not ini settings
# ══════════════════════════════════════════════════════════════════════════════

[pytest]

# ── testpaths ─────────────────────────────────────────────────────────────────
# WHERE pytest looks for test files.
# Without this, pytest would search from the current directory down through
# ALL folders, including node_modules or build output — slow and noisy.
# Setting testpaths = tests means: "only look inside the tests/ folder."
testpaths = tests

# ── log_cli ───────────────────────────────────────────────────────────────────
# Whether to show log messages in REAL TIME as tests run (live streaming).
# true  → you see print() and logging.info() output immediately while running
# false → log output is only shown after each test finishes (or not at all)
# Setting this to true is very helpful for debugging — you see exactly which
# step a test was on when it failed.
log_cli = true

# ── log_cli_level ─────────────────────────────────────────────────────────────
# The minimum log level to display in the terminal.
# Log levels (from most to least verbose): DEBUG < INFO < WARNING < ERROR < CRITICAL
# INFO means: show INFO, WARNING, ERROR, and CRITICAL messages.
# DEBUG messages (very detailed internal tracing) are hidden at INFO level.
# Use DEBUG if you need to trace every single step.
log_cli_level = INFO

# ── addopts ───────────────────────────────────────────────────────────────────
# Extra command-line options that pytest ALWAYS applies automatically.
# It's like having a "default command": pytest -v --tb=short
#
# -v (verbose):
#   Shows EACH test's full name and PASS/FAIL status on its own line.
#   Without -v you only see dots (.) for pass and F for fail — hard to read.
#   With -v output looks like:
#     tests/test_books.py::TestBooks::test_get_all_books_returns_list PASSED
#     tests/test_books.py::TestBooks::test_filter_books_by_fiction   PASSED
#
# --tb=short (traceback style):
#   Controls how much detail is shown when a test FAILS.
#   Options:
#     --tb=long   → full traceback with every function call (default, can be overwhelming)
#     --tb=short  → only the relevant assertion line and a few lines of context (clean)
#     --tb=line   → just the error message on one line (minimal)
#     --tb=no     → no traceback at all (just the test name and FAILED)
#   'short' is the sweet spot for most projects.
addopts = -v --tb=short
